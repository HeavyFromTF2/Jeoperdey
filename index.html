<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Jeopardy Clone - 7 Categories & Local Files</title>
    <style>
        /* ==========================================================================
           VARIABLES AND RESET
           ========================================================================== */
        :root {
            --bg-dark: #000000;
            --jeopardy-blue: #010a78;
            --jeopardy-blue-light: #0512c7;
            --jeopardy-yellow: #d69f4c;
            --jeopardy-yellow-bright: #ffcc00;
            --text-color: #ffffff;
            --font-main: 'Impact', 'Arial Black', sans-serif;
            --font-ui: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-speed: 0.4s;
            --cell-gap: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
        }

        button:focus-visible, .cell:focus-visible, .board-header:focus-visible {
            outline: 4px solid var(--jeopardy-yellow-bright);
            outline-offset: -4px;
        }

        .hidden { display: none !important; }

        /* ==========================================================================
           TOOLBAR
           ========================================================================== */
        #toolbar {
            background: rgba(20, 20, 20, 0.95);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            z-index: 10;
        }

        .toolbar-title {
            font-family: var(--font-main);
            color: var(--jeopardy-yellow-bright);
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-right: 20px;
        }

        .btn {
            background: #444;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn:hover { background: #666; }
        .btn.primary { background: #0066cc; }
        .btn.primary:hover { background: #0088ff; }
        .btn.danger { background: #cc0000; }
        .btn.danger:hover { background: #ff0000; }
        .btn.active-mode { background: var(--jeopardy-yellow-bright); color: black; }

        /* ==========================================================================
           BOARD CONTAINER
           ========================================================================== */
        #board-container {
            flex-grow: 1;
            padding: var(--cell-gap);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        #board {
            display: grid;
            flex-grow: 1;
            gap: var(--cell-gap);
            width: 100%;
            height: 100%;
        }

        .board-header {
            background-color: var(--jeopardy-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: var(--font-main);
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px black;
            padding: 5px;
            word-wrap: break-word;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .edit-mode .board-header {
            cursor: pointer;
        }

        .cell {
            background-color: var(--jeopardy-blue-light);
            color: var(--jeopardy-yellow-bright);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-main);
            font-size: clamp(2.5rem, 5vw, 4rem);
            text-shadow: 3px 3px 0px black;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 4px 6px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.2s, opacity 0.3s;
        }

        .cell:hover {
            filter: brightness(1.3);
            transform: scale(0.98);
        }

        .cell.used { opacity: 0.3; }

        .edit-mode .cell:hover, .edit-mode .board-header:hover {
            box-shadow: inset 0 0 0 4px var(--jeopardy-yellow-bright);
        }

        /* ==========================================================================
           SCOREBOARD
           ========================================================================== */
        #scoreboard {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px 15px 20px 15px;
            background: var(--bg-dark);
            flex-wrap: wrap;
            border-top: 2px solid #222;
        }

        .team {
            background: var(--jeopardy-blue);
            border: 2px solid var(--text-color);
            padding: 10px;
            min-width: 160px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .team-name { margin-bottom: 5px; }
        
        .score-input { 
            background: transparent; 
            color: white; 
            font-family: var(--font-ui);
            font-weight: bold;
            font-size: 1.1rem;
            border: none; 
            text-align: center; 
            width: 100%; 
            outline: none; 
            text-transform: uppercase;
        }

        .score-input.number {
            font-family: var(--font-main);
            font-size: 2.2rem;
            color: var(--text-color);
            text-shadow: 2px 2px 0px black;
        }

        .score-controls {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 8px;
        }

        .score-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .score-btn:hover { background: rgba(255,255,255,0.4); }

        /* ==========================================================================
           FULL SCREEN QUESTION & ANSWER MODAL
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--jeopardy-blue-light);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 95%;
            max-width: 1600px;
            height: 95vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: scale(0.8);
            transition: transform var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto;
            padding: 20px;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .text-display {
            font-family: var(--font-main);
            font-size: clamp(2rem, 4vw, 5rem);
            color: white;
            text-shadow: 4px 4px 0px black, 0 0 20px rgba(0,0,0,0.5);
            margin: 15px 0;
            text-transform: uppercase;
            line-height: 1.2;
            user-select: text;
        }

        .answer-text {
            color: var(--jeopardy-yellow-bright);
        }

        .media-container {
            width: 100%;
            max-width: 800px;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img, .media-container video {
            max-width: 100%;
            max-height: 40vh;
            object-fit: contain;
            border: 4px solid white;
            background: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .media-container iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: 50vh;
            border: 4px solid white;
            background: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .controls-area {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        .team-award-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
        }

        .award-card {
            background: rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 10px 15px;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .award-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .award-score { 
            font-family: var(--font-main); 
            font-size: 2rem; 
            color: var(--jeopardy-yellow-bright);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px black;
        }

        .award-actions {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .award-actions button {
            flex: 1;
            padding: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 4px;
            color: white;
            transition: filter 0.2s;
        }

        .btn-plus { background: #28a745; }
        .btn-minus { background: #dc3545; }
        .award-actions button:hover { filter: brightness(1.2); }

        .hint-text {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           EDITOR MODAL
           ========================================================================== */
        .editor-modal-wrapper {
            background: rgba(0,0,0,0.8);
        }

        .editor-modal {
            background: #f4f4f4;
            color: #333;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: left;
            transform: translateY(-20px);
            transition: transform var(--transition-speed);
        }

        .editor-modal-wrapper.active .editor-modal {
            transform: translateY(0);
        }

        .editor-modal h2 { margin-bottom: 20px; font-size: 1.5rem; border-bottom: 2px solid #ddd; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #555; }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: var(--font-ui);
            font-size: 1rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #0066cc;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.2);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }

        .media-hint { font-size: 0.85rem; color: #666; margin-top: 4px; }
        
        .file-upload-row {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .editor-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 25px;
            position: sticky;
            bottom: -10px;
            background: #f4f4f4;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }

        .editor-actions .btn { padding: 10px 20px; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="toolbar">
        <div style="display: flex; align-items: center;">
            <span class="toolbar-title">JEOPARDY</span>
            <button class="btn" id="btn-toggle-mode">Edit Mode</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn" id="btn-add-team">New Team</button>
            <button class="btn danger" id="btn-reset">Reset</button>
            <span style="color: #666;">|</span>
            <button class="btn" id="btn-export">Export</button>
            <label class="btn" for="import-file" style="cursor:pointer; margin: 0;">Import</label>
            <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
    </div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="scoreboard"></div>

    <div id="question-modal" class="modal-overlay" aria-hidden="true" role="dialog">
        <div class="modal-content">
            
            <div id="section-question">
                <div id="qm-question-media" class="media-container hidden"></div>
                <div id="qm-question" class="text-display question-text"></div>
            </div>

            <div id="section-answer" class="hidden">
                <div id="qm-answer-media" class="media-container hidden"></div>
                <div id="qm-answer" class="text-display answer-text"></div>
            </div>

            <div class="controls-area">
                <button id="btn-reveal" class="btn primary" style="font-size: 1.5rem; padding: 20px 40px; border-radius: 8px;">Reveal Answer</button>
                
                <div id="team-award-area" class="team-award-grid hidden"></div>

                <div class="hint-text" id="hint-text">Press [SPACE] to reveal &bull; Press [ESC] to continue</div>
                <button id="btn-close-question" class="btn hidden" style="margin-top: 10px; padding: 10px 20px;">Continue (ESC)</button>
            </div>
        </div>
    </div>

    <div id="editor-modal" class="modal-overlay editor-modal-wrapper" aria-hidden="true" role="dialog">
        <div class="editor-modal">
            <h2 id="editor-title">Edit</h2>
            
            <div id="edit-cat-section" class="hidden">
                <div class="form-group">
                    <label for="edit-cat-name">Category Name</label>
                    <input type="text" id="edit-cat-name" autocomplete="off">
                </div>
            </div>

            <div id="edit-q-section" class="hidden">
                <div class="form-group">
                    <label for="edit-cell-cat-name">Category Name</label>
                    <input type="text" id="edit-cell-cat-name" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="edit-q-val">Point Value</label>
                    <input type="number" id="edit-q-val" autocomplete="off">
                </div>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                <h3 style="margin-bottom: 10px; color: #0066cc;">Question Data</h3>
                
                <div class="form-group">
                    <label for="edit-q-text">Question Text</label>
                    <textarea id="edit-q-text" autocomplete="off"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-q-media">Question Media (URL Link or Local File)</label>
                    <div class="file-upload-row">
                        <input type="text" id="edit-q-media" placeholder="HTTP Link or file data..." autocomplete="off">
                        <label class="btn primary" style="white-space: nowrap; align-self: center;">
                            Upload File
                            <input type="file" id="file-q-media" class="hidden" accept="image/*,video/*,audio/*">
                        </label>
                    </div>
                    <div class="media-hint">You can paste a YouTube/URL link, or upload local photos/audio/videos directly from your PC.</div>
                </div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                <h3 style="margin-bottom: 10px; color: #28a745;">Answer Data</h3>

                <div class="form-group">
                    <label for="edit-q-ans">Answer Text</label>
                    <textarea id="edit-q-ans" autocomplete="off"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-q-ans-media">Answer Media (URL Link or Local File)</label>
                    <div class="file-upload-row">
                        <input type="text" id="edit-q-ans-media" placeholder="HTTP Link or file data..." autocomplete="off">
                        <label class="btn primary" style="white-space: nowrap; align-self: center;">
                            Upload File
                            <input type="file" id="file-q-ans-media" class="hidden" accept="image/*,video/*,audio/*">
                        </label>
                    </div>
                    <div class="media-hint">Shown only when the answer is revealed.</div>
                </div>
            </div>

            <div class="editor-actions">
                <button class="btn" id="btn-editor-cancel">Cancel</button>
                <button class="btn primary" id="btn-editor-save">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================================================
           GAME STATE AND CONFIGURATION
           ========================================================================== */
        const DEFAULT_COLS = 7; 
        const DEFAULT_ROWS = 5;

        let gameState = {
            mode: 'play',
            cols: DEFAULT_COLS,
            rows: DEFAULT_ROWS,
            categories: Array.from({length: DEFAULT_COLS}, (_, i) => `CATEGORY ${i + 1}`),
            questions: {}, 
            teams: [
                { id: 1, name: "Team 1", score: 0 },
                { id: 2, name: "Team 2", score: 0 },
                { id: 3, name: "Team 3", score: 0 }
            ],
            activeCell: null
        };

        function generateDefaultQuestions() {
            for (let c = 0; c < gameState.cols; c++) {
                for (let r = 0; r < gameState.rows; r++) {
                    const key = `${c}-${r}`;
                    if (!gameState.questions[key]) {
                        gameState.questions[key] = {
                            v: (r + 1) * 100,
                            q: `Question for ${gameState.categories[c]} for ${(r+1)*100}`,
                            q_m: "",
                            a: `Correct answer here`,
                            a_m: "",
                            used: false
                        };
                    }
                }
            }
        }

        /* ==========================================================================
           PERSISTENCE (LOCALSTORAGE)
           ========================================================================== */
        const STORAGE_KEY = 'jeopardy_ultimate_state';

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.questions) {
                        for (let key in parsed.questions) {
                            let q = parsed.questions[key];
                            if (q.m !== undefined && q.q_m === undefined) {
                                q.q_m = q.m;
                                delete q.m;
                            }
                            if (q.a_m === undefined) q.a_m = "";
                        }
                    }
                    if (parsed.cols && parsed.cols !== DEFAULT_COLS) {
                         parsed.cols = DEFAULT_COLS;
                         while(parsed.categories.length < DEFAULT_COLS) {
                             parsed.categories.push(`CATEGORY ${parsed.categories.length + 1}`);
                         }
                    }
                    if(parsed.categories && parsed.questions) {
                        gameState = { ...gameState, ...parsed };
                    }
                    generateDefaultQuestions();
                } else {
                    generateDefaultQuestions();
                    saveState();
                }
            } catch (e) {
                generateDefaultQuestions();
            }
        }

        /* ==========================================================================
           MEDIA EMBED HELPERS & LOCAL FILE SUPPORT (BASE64)
           ========================================================================== */
        function getEmbedHTML(url) {
            if (!url) return '';
            url = url.trim();
            
            const ytRegex = /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))([^&?#]+)/;
            const ytMatch = url.match(ytRegex);
            
            if (ytMatch && ytMatch[1]) {
                const videoId = ytMatch[1];
                
                return `<iframe 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&rel=0" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen
                    style="width: 100%; height: 100%; min-height: 360px;">
                </iframe>`;
            }

            if (url.startsWith('data:video/') || url.match(/\.(mp4|webm|ogg)$/i)) {
                return `<video src="${url}" controls autoplay></video>`;
            }

            if (url.startsWith('data:audio/') || url.match(/\.(mp3|wav|ogg)$/i)) {
                return `<audio src="${url}" controls autoplay style="width: 100%; margin-top: 20px;"></audio>`;
            }

            if (url.startsWith('data:image/') || url.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i)) {
                return `<img src="${url}" alt="Media" />`;
            }

            if (url.startsWith('data:')) {
                if(url.includes('video')) return `<video src="${url}" controls autoplay></video>`;
                if(url.includes('audio')) return `<audio src="${url}" controls autoplay style="width: 100%; margin-top: 20px;"></audio>`;
                return `<img src="${url}" alt="Media" />`;
            }

            return `<img src="${url}" alt="Media" onerror="this.style.display='none';" />`;
        }

        function renderMediaContainer(elementId, url) {
            const el = document.getElementById(elementId);
            if (url && url.trim() !== "") {
                el.innerHTML = getEmbedHTML(url);
                el.classList.remove('hidden');
            } else {
                el.innerHTML = '';
                el.classList.add('hidden');
            }
        }

        function handleFileUpload(fileInputId, textInputId) {
            const fileInput = document.getElementById(fileInputId);
            const textInput = document.getElementById(textInputId);
            
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 25 * 1024 * 1024) {
                    alert("File too large! Please try compressed files under 25MB to ensure system stability.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    textInput.value = evt.target.result; 
                    alert(`File "${file.name}" uploaded successfully to the local system!`);
                };
                reader.readAsDataURL(file);
            });
        }

        /* ==========================================================================
           BOARD RENDERING
           ========================================================================== */
        const boardEl = document.getElementById('board');
        const boardContainer = document.getElementById('board-container');

        function renderBoard() {
            boardContainer.classList.toggle('edit-mode', gameState.mode === 'edit');
            
            boardEl.style.gridTemplateColumns = `repeat(${gameState.cols}, 1fr)`;
            boardEl.style.gridTemplateRows = `min-content repeat(${gameState.rows}, 1fr)`;
            boardEl.innerHTML = '';

            for (let c = 0; c < gameState.cols; c++) {
                const div = document.createElement('div');
                div.className = 'board-header';
                div.textContent = gameState.categories[c] || `Cat ${c+1}`;
                div.tabIndex = 0;
                div.onclick = () => handleCategoryClick(c);
                div.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') handleCategoryClick(c); };
                boardEl.appendChild(div);
            }

            for (let r = 0; r < gameState.rows; r++) {
                for (let c = 0; c < gameState.cols; c++) {
                    const key = `${c}-${r}`;
                    const qData = gameState.questions[key] || { v: (r+1)*100, used: false };
                    
                    const div = document.createElement('div');
                    div.className = `cell ${qData.used ? 'used' : ''}`;
                    div.textContent = qData.v;
                    div.tabIndex = 0;
                    div.setAttribute('role', 'button');
                    
                    div.onclick = () => handleCellClick(c, r);
                    div.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCellClick(c, r); } };
                    
                    boardEl.appendChild(div);
                }
            }
        }

        /* ==========================================================================
           SCOREBOARD RENDERING
           ========================================================================== */
        const scoreboardEl = document.getElementById('scoreboard');

        function renderScoreboard() {
            scoreboardEl.innerHTML = '';
            gameState.teams.forEach((team) => {
                const teamDiv = document.createElement('div');
                teamDiv.className = 'team';
                teamDiv.innerHTML = `
                    <div class="team-name">
                        <input type="text" class="score-input" value="${team.name}" 
                               onchange="updateTeamName(${team.id}, this.value)">
                    </div>
                    <div>
                        <input type="number" class="score-input number" value="${team.score}" 
                               onchange="updateTeamScore(${team.id}, this.value)">
                    </div>
                    <div class="score-controls">
                        <button class="score-btn" onclick="adjustScore(${team.id}, -100)" title="Subtract 100">-</button>
                        <button class="score-btn" onclick="adjustScore(${team.id}, 100)" title="Add 100">+</button>
                        <button class="score-btn" onclick="removeTeam(${team.id})" style="background:rgba(220,53,69,0.7);" title="Remove Team">🗑️</button>
                    </div>
                `;
                scoreboardEl.appendChild(teamDiv);
            });
        }

        function updateTeamName(id, newName) {
            const t = gameState.teams.find(t => t.id === id);
            if(t) { t.name = newName; saveState(); updateModalScores(); }
        }

        function updateTeamScore(id, newScore) {
            const t = gameState.teams.find(t => t.id === id);
            if(t) { t.score = parseInt(newScore) || 0; saveState(); renderScoreboard(); updateModalScores(); }
        }

        function adjustScore(id, delta) {
            const t = gameState.teams.find(t => t.id === id);
            if(t) { t.score += delta; saveState(); renderScoreboard(); updateModalScores(); }
        }

        function addTeam() {
            const newId = gameState.teams.length ? Math.max(...gameState.teams.map(t=>t.id)) + 1 : 1;
            gameState.teams.push({ id: newId, name: `Team ${newId}`, score: 0 });
            saveState(); renderScoreboard();
        }

        function removeTeam(id) {
            if(confirm("Remove this team?")) {
                gameState.teams = gameState.teams.filter(t => t.id !== id);
                saveState(); renderScoreboard();
            }
        }

        document.getElementById('btn-add-team').addEventListener('click', addTeam);

        /* ==========================================================================
           GAME LOGIC (QUESTION MODAL)
           ========================================================================== */
        const modalQuestion = document.getElementById('question-modal');
        const sectionQuestion = document.getElementById('section-question');
        const sectionAnswer = document.getElementById('section-answer');
        
        const qmText = document.getElementById('qm-question');
        const qmAnswerText = document.getElementById('qm-answer');
        
        const btnReveal = document.getElementById('btn-reveal');
        const teamAwardArea = document.getElementById('team-award-area');
        const btnCloseQuestion = document.getElementById('btn-close-question');
        const hintText = document.getElementById('hint-text');
        
        let currentQuestionValue = 0;
        let isAnswerRevealed = false;

        function handleCellClick(c, r) {
            if (gameState.mode === 'edit') openEditor('cell', c, r);
            else playQuestion(c, r);
        }

        function handleCategoryClick(c) {
            if (gameState.mode === 'edit') openEditor('category', c, 0);
        }

        function playQuestion(c, r) {
            const key = `${c}-${r}`;
            const q = gameState.questions[key];
            if (!q) return;

            gameState.activeCell = key;
            currentQuestionValue = parseInt(q.v) || 0;
            isAnswerRevealed = false;

            sectionQuestion.classList.remove('hidden');
            sectionAnswer.classList.add('hidden');
            btnReveal.classList.remove('hidden');
            teamAwardArea.classList.add('hidden');
            btnCloseQuestion.classList.add('hidden');
            hintText.textContent = "Press [SPACE] to reveal answer • [ESC] to exit";

            qmText.textContent = q.q;
            qmAnswerText.textContent = q.a;

            document.getElementById('qm-question-media').innerHTML = '';
            document.getElementById('qm-answer-media').innerHTML = '';

            renderMediaContainer('qm-question-media', q.q_m);

            modalQuestion.classList.add('active');
            modalQuestion.setAttribute('aria-hidden', 'false');
            setTimeout(() => btnReveal.focus(), 100);
        }

        function revealAnswer() {
            if(isAnswerRevealed) return;
            isAnswerRevealed = true;
            
            const q = gameState.questions[gameState.activeCell];

            renderMediaContainer('qm-answer-media', q.a_m);
            sectionAnswer.classList.remove('hidden');
            
            if (q.a_m && q.a_m.trim() !== '') {
                document.getElementById('qm-question-media').innerHTML = ''; 
                document.getElementById('qm-question-media').classList.add('hidden');
            }

            btnReveal.classList.add('hidden');
            renderModalScoreboard();
            
            teamAwardArea.classList.remove('hidden');
            btnCloseQuestion.classList.remove('hidden');
            hintText.textContent = "Press [ESC] to return to the board";
            btnCloseQuestion.focus();
        }

        btnReveal.addEventListener('click', revealAnswer);

        function renderModalScoreboard() {
            teamAwardArea.innerHTML = '';
            gameState.teams.forEach(team => {
                const div = document.createElement('div');
                div.className = 'award-card';
                div.innerHTML = `
                    <div class="award-name">${team.name}</div>
                    <div class="award-score" id="modal-score-val-${team.id}">${team.score}</div>
                    <div class="award-actions">
                        <button class="btn-minus" onclick="awardPointsToTeam(${team.id}, false)">-${currentQuestionValue}</button>
                        <button class="btn-plus" onclick="awardPointsToTeam(${team.id}, true)">+${currentQuestionValue}</button>
                    </div>
                `;
                teamAwardArea.appendChild(div);
            });
        }

        function updateModalScores() {
            if (!isAnswerRevealed) return;
            gameState.teams.forEach(team => {
                const el = document.getElementById(`modal-score-val-${team.id}`);
                if (el) el.textContent = team.score;
            });
        }

        window.awardPointsToTeam = function(teamId, isPositive) {
            adjustScore(teamId, isPositive ? currentQuestionValue : -currentQuestionValue);
        };

        btnCloseQuestion.addEventListener('click', closeQuestion);

        function closeQuestion() {
            if (gameState.activeCell) {
                gameState.questions[gameState.activeCell].used = true;
                gameState.activeCell = null;
                saveState(); renderBoard();
            }
            document.getElementById('qm-question-media').innerHTML = '';
            document.getElementById('qm-answer-media').innerHTML = '';
            modalQuestion.classList.remove('active');
            modalQuestion.setAttribute('aria-hidden', 'true');
        }

        /* ==========================================================================
           KEYBOARD SHORTCUTS
           ========================================================================== */
        document.addEventListener('keydown', (e) => {
            const isModalOpen = modalQuestion.classList.contains('active');
            const isEditorOpen = modalEditor.classList.contains('active');

            if (e.key === 'Escape') {
                if (isModalOpen) closeQuestion();
                if (isEditorOpen) closeEditor();
            }

            if (e.code === 'Space' && isModalOpen) {
                if(document.activeElement.tagName !== 'BUTTON' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    e.preventDefault(); 
                    if (!isAnswerRevealed) revealAnswer();
                    else closeQuestion();
                }
            }
        });

        /* ==========================================================================
           EDITOR LOGIC
           ========================================================================== */
        const modalEditor = document.getElementById('editor-modal');
        const sectionCat = document.getElementById('edit-cat-section');
        const sectionQ = document.getElementById('edit-q-section');
        const titleEditor = document.getElementById('editor-title');
        
        let editingTarget = { type: null, c: 0, r: 0 };

        function openEditor(type, c, r) {
            editingTarget = { type, c, r };
            
            if (type === 'category') {
                titleEditor.textContent = 'Edit Category';
                sectionCat.classList.remove('hidden');
                sectionQ.classList.add('hidden');
                document.getElementById('edit-cat-name').value = gameState.categories[c];
            } else {
                titleEditor.textContent = `Edit Cell (${gameState.categories[c]})`;
                sectionCat.classList.add('hidden');
                sectionQ.classList.remove('hidden');
                
                const q = gameState.questions[`${c}-${r}`];
                document.getElementById('edit-cell-cat-name').value = gameState.categories[c];
                document.getElementById('edit-q-val').value = q.v;
                document.getElementById('edit-q-text').value = q.q;
                document.getElementById('edit-q-media').value = q.q_m || "";
                document.getElementById('edit-q-ans').value = q.a;
                document.getElementById('edit-q-ans-media').value = q.a_m || "";
            }

            modalEditor.classList.add('active');
            modalEditor.setAttribute('aria-hidden', 'false');
            
            setTimeout(() => {
                if(type === 'category') document.getElementById('edit-cat-name').focus();
                else document.getElementById('edit-cell-cat-name').focus();
            }, 50);
        }

        document.getElementById('btn-editor-cancel').addEventListener('click', closeEditor);
        
        document.getElementById('btn-editor-save').addEventListener('click', () => {
            if (editingTarget.type === 'category') {
                gameState.categories[editingTarget.c] = document.getElementById('edit-cat-name').value.toUpperCase();
            } else {
                const key = `${editingTarget.c}-${editingTarget.r}`;
                
                // Update category name from cell editor input
                gameState.categories[editingTarget.c] = document.getElementById('edit-cell-cat-name').value.toUpperCase();
                
                gameState.questions[key] = {
                    ...gameState.questions[key],
                    v: document.getElementById('edit-q-val').value,
                    q: document.getElementById('edit-q-text').value,
                    q_m: document.getElementById('edit-q-media').value,
                    a: document.getElementById('edit-q-ans').value,
                    a_m: document.getElementById('edit-q-ans-media').value,
                    used: false
                };
            }
            saveState(); renderBoard(); closeEditor();
        });

        function closeEditor() {
            modalEditor.classList.remove('active');
            modalEditor.setAttribute('aria-hidden', 'true');
        }

        /* ==========================================================================
           TOOLBAR ACTIONS
           ========================================================================== */
        const btnToggleMode = document.getElementById('btn-toggle-mode');
        
        btnToggleMode.addEventListener('click', () => {
            gameState.mode = gameState.mode === 'play' ? 'edit' : 'play';
            btnToggleMode.textContent = gameState.mode === 'play' ? 'Edit Mode' : 'Exit Edit Mode';
            btnToggleMode.classList.toggle('active-mode', gameState.mode === 'edit');
            renderBoard();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            if (confirm('Warning: This will reset scores and uncheck all questions. Continue?')) {
                Object.keys(gameState.questions).forEach(k => gameState.questions[k].used = false);
                gameState.teams.forEach(t => t.score = 0);
                saveState(); renderBoard(); renderScoreboard();
            }
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gameState, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "jeopardy_clone_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click(); downloadAnchorNode.remove();
        });

        document.getElementById('import-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.categories && imported.questions && imported.teams) {
                        gameState = imported;
                        if (gameState.cols !== DEFAULT_COLS) {
                            gameState.cols = DEFAULT_COLS;
                            while(gameState.categories.length < DEFAULT_COLS) {
                                gameState.categories.push(`CATEGORY ${gameState.categories.length + 1}`);
                             }
                            generateDefaultQuestions();
                        }
                        gameState.mode = 'play';
                        btnToggleMode.textContent = 'Edit Mode';
                        btnToggleMode.classList.remove('active-mode');
                        saveState(); renderBoard(); renderScoreboard();
                        alert("Game imported successfully!");
                    } else { alert("Invalid JSON file."); }
                } catch (error) { alert("Error reading JSON file."); }
            };
            reader.readAsText(file); event.target.value = '';
        });

        /* ==========================================================================
           INITIALIZATION
           ========================================================================== */
        function init() {
            loadState();
            
            if(gameState.mode === 'edit') {
                btnToggleMode.textContent = 'Exit Edit Mode';
                btnToggleMode.classList.add('active-mode');
            }
            
            handleFileUpload('file-q-media', 'edit-q-media');
            handleFileUpload('file-q-ans-media', 'edit-q-ans-media');

            renderBoard();
            renderScoreboard();
        }

        init();
    </script>
</body>
</html>
